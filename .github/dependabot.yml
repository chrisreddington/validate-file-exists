version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions-all:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      npm-development:
        dependency-type: development
        update-types:
          - major
          - minor
          - patch
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
